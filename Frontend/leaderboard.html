<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Tactical Terminal - Leaderboard</title>
  <link rel="stylesheet" href="leaderboard.css"/>
</head>
<body>

  <!-- Top Nav Bar (Desktop) -->
  <header class="top-nav">
    <div class="nav-logo">TERMINAL_OS</div>

    <div class="nav-links">
      <a class="nav-link" href="operations.html">OPERATIONS</a>
      <a class="nav-link active" href="leaderboard.html">LEADERBOARD</a>
      <a class="nav-link" href="shop.html">SHOP</a>
    </div>

    <div class="nav-right">
      <div class="nav-icons">
        <button class="nav-icon-btn">
            <span class="material-symbols-outlined">notifications</span>
        </button>
        <button class="nav-icon-btn">
            <span class="material-symbols-outlined">terminal</span>
        </button>
      </div>
      <div class="nav-user">
        <span class="nav-username">USER_NAME</span>
        <button class="nav-icon-btn">
          <span class="material-symbols-outlined">account_circle</span>
        </button>
      </div>
  </header>

  <!-- Main Content -->
  <main>
    <div class="main-inner">

      <!-- Prize Pool Section -->
      <section class="prize-section">
        <div class="prize-glow"></div>
        <div class="prize-card">
          <div class="prize-scanline scanline"></div>

          <div class="prize-left">
            <div class="prize-label">Current Reward Allocation</div>
            <h1 class="prize-title">PRIZE POOL</h1>
          </div>

          <div class="prize-right">
            <div class="prize-amount-box">
              <span class="prize-amount">100</span>
              <span class="prize-currency">INR</span>
            </div>
            <div class="prize-status">System Status: Active // Payout ready</div>
          </div>
        </div>
      </section>

      <!-- Grade Tabs -->
      <div class="grade-tabs">
        <button class="tab-btn active">GRADE 9</button>
        <button class="tab-btn inactive">GRADE 10</button>
        <button class="tab-btn inactive">GRADE 11</button>
        <button class="tab-btn inactive">GRADE 12</button>
        <button class="tab-btn inactive">REMAINING PLAYERS</button>
      </div>

      <!-- Leaderboard Table -->
      <div class="table-wrap">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>NAME</th>
                <th class="align-right">Eliminations</th>
              </tr>
            </thead>
            <tbody>

              <!-- Rank 01 -->
              <tr class="row-top">
                <td>
                  <div class="rank-cell">
                    <span class="rank-num top">#01</span>
                    <span class="material-symbols-outlined rank-icon-gold">military_tech</span>
                  </div>
                </td>
                <td><span class="player-name top">VANGUARD_42</span></td>
                <td class="elim-cell top">42</td>
              </tr>

              <!-- Rank 02 -->
              <tr class="row-default">
                <td>
                  <div class="rank-cell">
                    <span class="rank-num mid">#02</span>
                    <span class="material-symbols-outlined rank-icon-grey">shield</span>
                  </div>
                </td>
                <td><span class="player-name mid">GHOST_WALKER</span></td>
                <td class="elim-cell mid">38</td>
              </tr>

              <!-- Rank 03 -->
              <tr class="row-default">
                <td>
                  <div class="rank-cell">
                    <span class="rank-num mid">#03</span>
                    <span class="material-symbols-outlined rank-icon-grey">swords</span>
                  </div>
                </td>
                <td><span class="player-name mid">RAPTOR_X</span></td>
                <td class="elim-cell mid">35</td>
              </tr>

              <!-- Rank 04 -->
              <tr class="row-default">
                <td>
                  <div class="rank-cell">
                    <span class="rank-num low">#04</span>
                  </div>
                </td>
                <td><span class="player-name low">NULL_VECTOR</span></td>
                <td class="elim-cell low">29</td>
              </tr>

              <!-- Rank 05 -->
              <tr class="row-default">
                <td>
                  <div class="rank-cell">
                    <span class="rank-num low">#05</span>
                  </div>
                </td>
                <td><span class="player-name low">CYPHER_9</span></td>
                <td class="elim-cell low">27</td>
              </tr>

            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <!-- Global Decorative Overlays -->
  <div class="overlay-border"></div>
  <div class="scanline overlay-scanline"></div>

</body>
</html>
